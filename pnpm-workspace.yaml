catalogMode: prefer
ignoreWorkspaceRootCheck: true
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - tinyexec
  - ast-v8-to-istanbul

strictPeerDependencies: false
blockExoticSubdeps: false

packages:
  - packages/*
  - docs

allowBuilds:
  esbuild: true
  simple-git-hooks: true

overrides:
  vite: catalog:dev
  vitepress: catalog:prod

catalogs:
  dev:
    '@pengzhanbo/eslint-config-vue': ^2.6.1
    '@pengzhanbo/stylelint-config': ^2.6.1
    '@tsdown/css': ^0.22.3
    '@types/markdown-it': ^14.1.2
    '@types/markdown-it-container': ^4.0.0
    '@types/node': ^26.0.0
    '@types/picomatch': ^4.0.3
    '@types/qrcode': ^1.5.6
    '@vitest/coverage-v8': ^4.1.9
    bumpp: ^11.1.0
    conventional-changelog: ^7.2.1
    conventional-changelog-angular: ^8.3.1
    cpx2: ^9.0.0
    cross-env: ^10.1.0
    eslint: ^10.5.0
    markdown-it: ^14.2.0
    nano-staged: ^1.0.2
    oxc-minify: ^0.137.0
    rimraf: ^6.1.3
    simple-git-hooks: ^2.13.1
    stylelint: ^17.13.0
    tsdown: ^0.22.3
    typescript: ^6.0.3
    unplugin-vue: ^7.2.0
    unrun: ^0.3.1
    vite: ^8.1.0
    vitepress-plugin-group-icons: ^1.7.5
    vitepress-plugin-llms: ^1.13.2
    vitest: ^4.1.9
    vue-tsc: ^3.3.5

  peer:
    dashjs: ^5.2.0
    hls.js: ^1.6.16
    mpegts.js: 1.7.3

  prod:
    '@floating-ui/vue': ^2.0.0
    '@pengzhanbo/utils': ^3.7.3
    '@vueuse/core': ^14.3.0
    ansis: ^4.3.1
    artplayer: ^5.4.0
    gray-matter: ^4.0.3
    local-pkg: ^1.2.1
    markdown-it-container: ^4.0.0
    mermaid: ^11.15.0
    picomatch: ^4.0.4
    qrcode: ^1.5.4
    svgo: ^4.0.1
    tinyglobby: ^0.2.17
    unplugin-vue-components: ^32.1.0
    vitepress: ^2.0.0-alpha.17
    vue: ^3.5.38
    watermark-js-plus: ^1.6.3
